<!doctype html>
<html lang="da">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Next Level MC - Klub åbnings info</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#ff6a00">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
    <style>
        :root {
            --bg: #0b0b0d;
            --text: #f2f2f3;
            --muted: #b7b7be;
            --orange: #ff6a00;
            --orange2: #ff8a2a;
            --border: rgba(255,255,255,.10);
            --shadow: 0 10px 30px rgba(0,0,0,.35);
            --radius: 16px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            background: radial-gradient(1200px 800px at 10% 0%, rgba(255,106,0,.16), transparent 55%), radial-gradient(900px 600px at 90% 10%, rgba(255,138,42,.10), transparent 50%), var(--bg);
            color: var(--text);
        }

        header {
            padding: 20px 18px 12px;
            border-bottom: 1px solid var(--border);
            background: rgba(11,11,13,.80);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .wrap {
            max-width: 1100px;
            margin: 0 auto;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo{
  width: 34px;
  height: 34px;
  object-fit: contain;
  border-radius: 10px;

  /* Orange glow */
  filter:
    drop-shadow(0 0 6px rgba(255,106,0,.55))
    drop-shadow(0 0 14px rgba(255,106,0,.40))
    drop-shadow(0 0 26px rgba(255,138,42,.25));
}

        h1 {
            margin: 0;
            font-size: 18px;
            letter-spacing: .2px;
        }

        .sub {
            margin: 4px 0 0;
            color: var(--muted);
            font-size: 13px;
        }

        main {
            padding: 18px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            align-items: start;
        }

        @media (max-width: 900px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 14px;
        }

            .card h2 {
                margin: 0 0 10px;
                font-size: 15px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 10px;
            }

        .pill {
            font-size: 12px;
            padding: 6px 10px;
            border-radius: 999px;
            border: 1px solid rgba(255,106,0,.35);
            color: var(--orange2);
            background: rgba(255,106,0,.08);
            white-space: nowrap;
        }

        .muted {
            color: var(--muted);
            font-size: 13px;
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 12px 0;
        }

        .row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        input {
            font: inherit;
            color: var(--text);
            background: rgba(255,255,255,.04);
            border: 1px solid rgba(255,255,255,.12);
            border-radius: 12px;
            padding: 10px 10px;
            outline: none;
        }

            input:focus {
                border-color: rgba(255,106,0,.55);
                box-shadow: 0 0 0 3px rgba(255,106,0,.15);
            }

        button {
            font: inherit;
            color: var(--text);
            border: 1px solid rgba(255,106,0,.50);
            background: rgba(255,106,0,.12);
            padding: 9px 12px;
            border-radius: 12px;
            cursor: pointer;
            user-select: none;
            transition: transform .04s ease;
        }

            button:active {
                transform: translateY(1px);
            }

        .list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .club {
            background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.01));
            border: 1px solid rgba(255,255,255,.08);
            border-radius: 14px;
            padding: 12px;
        }

        .name {
            font-weight: 700;
            letter-spacing: .2px;
            margin-bottom: 2px;
        }

        .addr {
            color: var(--muted);
            font-size: 13px;
            margin-bottom: 6px;
        }

        .tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tag {
            font-size: 12px;
            padding: 5px 9px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,.12);
            color: rgba(255,255,255,.88);
            background: rgba(255,255,255,.03);
        }

            .tag.orange {
                border-color: rgba(255,106,0,.45);
                background: rgba(255,106,0,.10);
                color: var(--orange2);
            }

        .empty {
            display: none;
            margin-top: 10px;
            font-size: 13px;
            color: rgba(255,255,255,.85);
        }

        .hint {
            font-size: 12px;
            color: var(--muted);
            margin-top: 8px;
            line-height: 1.35;
        }

        code.inline {
            padding: 2px 6px;
            border-radius: 8px;
            background: rgba(255,255,255,.06);
            border: 1px solid rgba(255,255,255,.10);
        }
        /* ===== Add Club modal ===== */
.hidden { display: none !important; }

.modal{
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.65);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  z-index: 9999;
}

.modalBox{
  width: min(560px, 100%);
  max-height: calc(100vh - 32px);
  overflow: auto;
  border-radius: 14px;
  padding: 14px;
  background: rgba(18,18,18,.96);
  border: 1px solid rgba(255,255,255,.10);
  box-shadow: 0 18px 55px rgba(0,0,0,.6);
}

.modalHeader{
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 10px;
}

.modalHeader h2{
  margin: 0;
  font-size: 1.1rem;
}

#closeAddClub{
  cursor: pointer;
  border: 1px solid rgba(255,255,255,.12);
  background: rgba(255,255,255,.08);
}

#closeAddClub:hover{
  background: rgba(255,255,255,.12);
}

/* Inputs/textarea kun inde i modal (så vi ikke ændrer resten af siden) */
.modalBody input,
.modalBody textarea{
  width: 100%;
  margin: 6px 0;
}

.modalBody textarea{
  resize: vertical;
  min-height: 120px;
}

/* Floating “+ Tilføj klub” knap */
#openAddClub{
  position: fixed;
  right: 16px;
  bottom: 16px;
  z-index: 9000;
  border-radius: 999px;
  padding: 12px 16px;
  box-shadow: 0 12px 35px rgba(0,0,0,.35);
  backdrop-filter: blur(8px);
}
    </style>
</head>

<body>
    <header>
        <div class="wrap">
            <div class="brand">
                <img class="logo" src="logo.png" alt="Next Level MC logo">
                <div>
                    <h1>Next Level MC - Klub åbnings info</h1>
                    <div class="sub" id="todayLine">Indlæser…</div>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="wrap grid">
            <section class="card">
  <h2>Søg klub <span class="pill" id="searchPill">—</span></h2>

  <div class="row">
    <input id="globalSearch" type="search" placeholder="Søg efter navn eller adresse" />
    <button id="btnGlobalClear" type="button">Ryd</button>
  </div>

  <div class="hint">Søger i alle klubber</div>

  <div class="divider"></div>
  <div class="list" id="globalList"></div>
  <div class="empty" id="globalEmpty">Skriv noget i søgefeltet…</div>
</section>
            <section class="card">
                <h2>I dag <span class="pill" id="todayPill">—</span></h2>
                <div class="muted" id="todayDesc">Finder klubber…</div>
                <div class="divider"></div>
                <div class="list" id="todayList"></div>
                <div class="empty" id="todayEmpty">Ingen klubber med åbent i dag.</div>

            </section>

            <section class="card">
                <h2>Vælg dato <span class="pill" id="pickPill">—</span></h2>
                <div class="row">
                    <input type="date" id="datePick" />
                    <button id="btnPick">Vis</button>
                </div>
                <div class="hint">Vælg en dato — værktøjet finder ugedagen og viser klubber med åbent den dag.</div>

                <div class="divider"></div>
                <div class="list" id="pickList"></div>
                <div class="empty" id="pickEmpty">Ingen klubber med åbent den dag.</div>
            </section>
        </div>
    </main>
    <button id="openAddClub" type="button">+ Tilføj klub</button>

<div id="addClubModal" class="modal hidden" aria-hidden="true">
  <div class="modalBox">
    <div class="modalHeader">
      <h2>Tilføj klub</h2>
      <button id="closeAddClub" type="button" aria-label="Luk">✕</button>
    </div>

    <div class="modalBody">
      <input id="acName" placeholder="Klubnavn" />
      <input id="acAddress" placeholder="Adresse" />
      <input id="acDays" placeholder="Dage (komma) fx Onsdag,Fredag" />
      <input id="acTime" placeholder="Tid fx 17:00" />

      <textarea id="acPreview" rows="8" readonly placeholder="Preview kommer her..."></textarea>

      <div class="row">
        <button id="acGenerate" type="button">Generér</button>
        <button id="acCopy" type="button">Kopiér</button>
        <button id="acMail" type="button">Send mail</button>
      </div>

      <p id="acNote" class="muted"></p>
    </div>
  </div>
</div>

    <script>
(() => {
    // 1. Globale variabler i dette scope
    let CLUBS = []; 
    const DAYS = ["Søndag", "Mandag", "Tirsdag", "Onsdag", "Torsdag", "Fredag", "Lørdag"];
    const el = (id) => document.getElementById(id);

    // 2. Hent data fra JSON
    async function loadData() {
        try {
            const response = await fetch('clubs.json');
            if (!response.ok) throw new Error("Kunne ikke hente clubs.json");
            
            CLUBS = await response.json();
            
            // Først når data er hentet, starter vi visningen
            initToday();
            initPicker();
            showGlobalSearch();
            setupSearchListeners();
        } catch (error) {
            console.error("Fejl:", error);
            el("todayLine").textContent = "Fejl: Tjek clubs.json";
        }
    }

    // 3. Hjælpefunktioner
    function toDaDate(d) {
        return d.toLocaleDateString("da-DK", { weekday: "long", year: "numeric", month: "long", day: "numeric" });
    }

    function weekdayDa(d) {
        return DAYS[d.getDay()];
    }

    function getClubDays(club) {
        const d = club.days ?? club.day ?? [];
        return Array.isArray(d) ? d : [String(d)];
    }

    function renderClub(club) {
        const box = document.createElement("div");
        box.className = "club";

        const name = document.createElement("div");
        name.className = "name";
        name.textContent = club.name;

        const addr = document.createElement("a");
        addr.className = "addr";
        // Fix: Rettet link til Google Maps
        addr.href = "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(club.address);
        addr.target = "_blank";
        addr.rel = "noopener noreferrer";
        addr.textContent = club.address;

        const tags = document.createElement("div");
        tags.className = "tags";

const dayTag = document.createElement("div");
dayTag.className = "tag";
dayTag.textContent = getClubDays(club).join(", ");

const timeTag = document.createElement("div");
timeTag.className = "tag orange";
timeTag.textContent = club.time;

tags.appendChild(dayTag);
tags.appendChild(timeTag);

// ✅ Note-tag (fx "Sidste fredag")
if (club.note) {
  const noteTag = document.createElement("div");
  noteTag.className = "tag"; // vil du have den orange: "tag orange"
  noteTag.textContent = club.note;
  tags.appendChild(noteTag);
}

// ✅ Lige/ulige uger tag (valgfrit)
if (club.parity) {
  const p = String(club.parity).toLowerCase();
  const parityTag = document.createElement("div");
  parityTag.className = "tag";
  parityTag.textContent =
    (p === "even") ? "LIGE UGER" :
    (p === "odd") ? "ULIGE UGER" :
    club.parity;
  tags.appendChild(parityTag);
}

box.appendChild(name);
box.appendChild(addr);
box.appendChild(tags);

        return box;
    }

    function norm(s) {
        return String(s || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    }

    function matchesSearch(club, q) {
        const hay = norm(`${club.name} ${club.address}`);
        return hay.includes(q);
    }

    // 4. Hovedfunktioner
    function showGlobalSearch() {
        const input = el("globalSearch");
        const listEl = el("globalList");
        const emptyEl = el("globalEmpty");
        const pill = el("searchPill");

        if (!input || !listEl || !emptyEl || !pill) return;

        const q = norm(input.value);
        listEl.innerHTML = "";

        if (!q) {
            pill.textContent = "—";
            emptyEl.style.display = "block";
            emptyEl.textContent = "Skriv noget i søgefeltet…";
            return;
        }

        const matches = CLUBS
            .filter(club => matchesSearch(club, q))
            .sort((a, b) => (a.name || "").localeCompare(b.name || "", "da"));

        pill.textContent = `${matches.length} match`;

        if (matches.length === 0) {
            emptyEl.style.display = "block";
            emptyEl.textContent = "Ingen match.";
            return;
        }

        emptyEl.style.display = "none";
        for (const club of matches) {
            listEl.appendChild(renderClub(club));
        }
    }

    function showForDay(dayName, listEl, emptyEl, descEl) {
        listEl.innerHTML = "";

        const matches = CLUBS.filter(club => {
            const days = getClubDays(club).map(x => String(x).trim());
            return days.includes(dayName);
        });

        if (descEl) descEl.textContent = `Klubber med åbent på ${dayName}: ${matches.length}`;

        if (matches.length === 0) {
            emptyEl.style.display = "block";
            return;
        }
        emptyEl.style.display = "none";

        matches.sort((a, b) => (a.time || "").localeCompare(b.time || "", "da"));

        for (const club of matches) {
            listEl.appendChild(renderClub(club));
        }
    }

    function initToday() {
        const now = new Date();
        const dayName = weekdayDa(now);
        el("todayLine").textContent = `I dag er det ${toDaDate(now)}.`;
        el("todayPill").textContent = dayName;
        showForDay(dayName, el("todayList"), el("todayEmpty"), el("todayDesc"));
    }

    function initPicker() {
        const dp = el("datePick");
        dp.value = "";
        el("pickPill").textContent = "—";
        el("pickList").innerHTML = "";
        el("pickEmpty").style.display = "block";

        function renderPicked() {
            if (!dp.value) return;
            const d = new Date(dp.value + "T12:00:00");
            const dayName = weekdayDa(d);
            el("pickPill").textContent = dayName;
            showForDay(dayName, el("pickList"), el("pickEmpty"), null);
        }

        el("btnPick").addEventListener("click", renderPicked);
        dp.addEventListener("change", renderPicked);
        dp.addEventListener("input", renderPicked);
    }

    function setupSearchListeners() {
        const gs = el("globalSearch");
        const gc = el("btnGlobalClear");

        if (gs) gs.addEventListener("input", showGlobalSearch);
        if (gc) {
            gc.addEventListener("click", () => {
                gs.value = "";
                showGlobalSearch();
                gs.focus();
            });
        }
    }

    // 5. Kør det hele
    loadData();

    // Service Worker
    if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("./sw.js");
    }

    // Opdater hvert minut
    setInterval(() => {
        if (CLUBS.length > 0) initToday();
    }, 60000);

})();
</script>
</body>
</html>
